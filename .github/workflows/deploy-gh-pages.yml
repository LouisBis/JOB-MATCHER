name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time, but don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (github-pages config)
        run: npm run build:gh-pages
        working-directory: frontend

      # GitHub Pages doesn't support the HTML5 History API.
      # Serving index.html as 404.html lets Angular's router handle deep links.
      - name: Copy index.html → 404.html
        run: cp dist/job-matcher-frontend/browser/index.html dist/job-matcher-frontend/browser/404.html
        working-directory: frontend

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/job-matcher-frontend/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

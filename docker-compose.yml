# =============================================================================
# docker-compose.yml — Job Matcher Stack
#
# Services:
#   - n8n-init   : One-time workflow importer (runs before n8n, then exits)
#   - n8n        : Workflow orchestration (port 5678)
#
# Ollama runs natively on macOS (not in Docker) for Metal GPU acceleration.
# Install: brew install ollama && ollama pull mistral
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# =============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────
  # n8n-init — Imports workflows before n8n starts, then exits.
  # Runs on every `docker compose up` but is idempotent (updates in place).
  # ─────────────────────────────────────────────────────────────────────────
  n8n-init:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: job-matcher-n8n-init
    restart: "no"
    # Build the workflow JSON from source files, then import it into n8n
    entrypoint: >
      sh -c "WORKFLOW_OUTPUT=/tmp/job-matcher.json node /build/scripts/build-workflow.js &&
             n8n import:workflow --separate --input=/tmp/"
    volumes:
      - n8n_data:/home/node/.n8n
      - .:/build:ro
    networks:
      - job-matcher-net
    labels:
      com.job-matcher.service: "n8n-init"
      com.job-matcher.description: "Builds workflow from source and imports into n8n"

  # ─────────────────────────────────────────────────────────────────────────
  # n8n — Workflow automation engine
  # Docs: https://docs.n8n.io/hosting/installation/docker/
  # ─────────────────────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: job-matcher-n8n
    restart: unless-stopped

    ports:
      - "${N8N_PORT:-5678}:5678"

    environment:
      # ── Auth ──────────────────────────────────────────────────────────────
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}

      # ── Host & protocol ───────────────────────────────────────────────────
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}

      # ── Execution & logging ───────────────────────────────────────────────
      EXECUTIONS_PROCESS: main
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: last
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "true"
      EXECUTIONS_DATA_MAX_AGE: "336" # Keep execution logs 2 weeks (hours)
      N8N_LOG_LEVEL: info

      # ── Timezone ──────────────────────────────────────────────────────────
      GENERIC_TIMEZONE: ${TIMEZONE:-Europe/Paris}
      TZ: ${TIMEZONE:-Europe/Paris}

      # ── Feature flags ─────────────────────────────────────────────────────
      N8N_DIAGNOSTICS_ENABLED: "false" # Disable telemetry
      N8N_VERSION_NOTIFICATIONS_ENABLED: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false" # Allow $env.* in workflow expressions
      NODE_FUNCTION_ALLOW_BUILTIN: "fs"     # Allow require('fs') in Code nodes

      # ── Ollama — runs natively on host, reachable via host.docker.internal ─
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}

      # ── Pass-through: app-level variables accessible inside n8n workflows ─
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-valig~indeed-jobs-scraper}
      APIFY_QUERY: ${APIFY_QUERY:-}
      APIFY_LOCATION: ${APIFY_LOCATION:-}
      APIFY_COUNTRY: ${APIFY_COUNTRY:-fr}
      APIFY_MAX_ITEMS: ${APIFY_MAX_ITEMS:-50}
      APIFY_DATE_POSTED: ${APIFY_DATE_POSTED:-3}
      FETCH_CRON: ${FETCH_CRON:-0 */3 * * *}
      MIN_SCORE: ${MIN_SCORE:-7}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

    volumes:
      # Persist n8n data (workflows, credentials, executions)
      - n8n_data:/home/node/.n8n
      # Mount CV file (read-only inside container)
      - ./data/cv:/data/cv:ro

    networks:
      - job-matcher-net

    depends_on:
      n8n-init:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    labels:
      com.job-matcher.service: "n8n"
      com.job-matcher.description: "Workflow orchestration engine"

# =============================================================================
# Networks
# =============================================================================
networks:
  job-matcher-net:
    name: job-matcher-net
    driver: bridge

# =============================================================================
# Volumes
# Managed by Docker — persists across container restarts and recreations.
# To wipe everything: docker compose down -v
# =============================================================================
volumes:
  n8n_data:
    name: job-matcher-n8n-data
    labels:
      com.job-matcher.volume: "n8n workflow data, credentials, executions"
